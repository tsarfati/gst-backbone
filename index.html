  <body>
    <div id="root"></div>
    <script>
      // Prevent stale PWA cache/service worker from serving old chunks and causing blank pages.
      (function () {
        if ('serviceWorker' in navigator) {
          var sw = navigator.serviceWorker;
          if (sw && typeof sw.getRegistrations === 'function') {
            sw.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            }).catch(function () {});
          } else if (sw && sw.ready) {
            sw.ready.then(function (registration) {
              registration.unregister();
            }).catch(function () {});
          }
        }
        if ('caches' in window && typeof caches.keys === 'function') {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              caches.delete(key);
            });
          });
        }
      })();
    </script>
